<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberAlert | Secure Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css"> <!-- Fallback external link -->
    <style>
        /* Safety Internal CSS to prevent "Scrap" look if external file fails */
        :root { --p: #4F46E5; --s: #06B6D4; --bg: #0F172A; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .auth-container { width: 100%; max-width: 900px; display: flex; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
        .hero { flex: 1; padding: 40px; background: linear-gradient(135deg, var(--p), var(--s)); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .forms { flex: 1; padding: 40px; position: relative; min-height: 500px; }
        .form-section { display: none; flex-direction: column; }
        .form-section.active { display: flex; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; }
        .btn { width: 100%; padding: 14px; background: var(--p); border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        .toggle { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #CBD5E1; }
        .toggle a { color: var(--s); cursor: pointer; font-weight: 600; }
        @media (max-width: 768px) { .auth-container { flex-direction: column; } .hero { padding: 30px; } }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="hero">
            <i class="fas fa-shield-halved fa-4x" style="margin-bottom: 15px;"></i>
            <h1>CyberAlert</h1>
            <p>Intelligence Hub for Fraud Awareness</p>
        </div>
        <div class="forms">
            <div id="login-box" class="form-section active">
                <h2>Login</h2>
                <form onsubmit="handleAuth(event, 'login')">
                    <input id="l-email" type="email" placeholder="Email" required>
                    <input id="l-pass" type="password" placeholder="Password" required>
                    <button type="submit" class="btn" id="l-btn">Login</button>
                </form>
                <div class="toggle">New? <a onclick="toggle('register')">Create Account</a></div>
            </div>
            <div id="reg-box" class="form-section">
                <h2>Register</h2>
                <form onsubmit="handleAuth(event, 'register')">
                    <input id="r-name" type="text" placeholder="Full Name" required>
                    <input id="r-email" type="email" placeholder="Email" required>
                    <input id="r-off" type="text" placeholder="Officer ID (Optional)">
                    <input id="r-pass" type="password" placeholder="Password" required minlength="6">
                    <button type="submit" class="btn" id="r-btn">Register</button>
                </form>
                <div class="toggle">Have an account? <a onclick="toggle('login')">Login</a></div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        function toggle(t) {
            document.getElementById('login-box').classList.toggle('active', t === 'login');
            document.getElementById('reg-box').classList.toggle('active', t === 'register');
        }
        async function handleAuth(e, type) {
            e.preventDefault();
            const btn = document.getElementById(type === 'login' ? 'l-btn' : 'r-btn');
            const data = type === 'login' ? 
                { email: document.getElementById('l-email').value, password: document.getElementById('l-pass').value } :
                { name: document.getElementById('r-name').value, email: document.getElementById('r-email').value, officer_id: document.getElementById('r-off').value, password: document.getElementById('r-pass').value };
            
            btn.disabled = true;
            try {
                const res = await fetch(`/api/${type}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
                const resData = await res.json();
                if (res.ok) {
                    Swal.fire('Success', resData.message, 'success').then(() => {
                        if (type === 'login') {
                            sessionStorage.setItem('cyberalert_auth', 'true');
                            sessionStorage.setItem('cyberalert_user', JSON.stringify(resData.user));
                            window.location.href = 'index.html';
                        } else toggle('login');
                    });
                } else Swal.fire('Error', resData.error, 'error');
            } catch { Swal.fire('Error', 'Server Error', 'error'); }
            btn.disabled = false;
        }
    </script>
</body>
</html>
