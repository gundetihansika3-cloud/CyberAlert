<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberAlert | Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="auth-container glass-panel">
        <div class="auth-hero">
            <i class="fas fa-shield-halved fa-4x mb-10" style="color: var(--secondary-light); text-shadow: 0 0 20px var(--secondary);"></i>
            <h1>CyberAlert</h1>
            <p>Intelligence Hub for Fraud Awareness</p>
        </div>

        <div class="auth-forms-wrapper">
            <!-- Login -->
            <div id="login-section" class="form-section active">
                <div class="form-header">
                    <h2>Login</h2>
                    <p>Enter your credentials to access the hub.</p>
                </div>
                <form id="login-form" onsubmit="handleAuth(event, 'login')" class="auth-form">
                    <input id="login-email" type="email" placeholder="Email Address" required>
                    <input id="login-password" type="password" placeholder="Password" required>
                    <button type="submit" class="auth-btn" id="login-btn">Login <i class="fas fa-sign-in-alt ml-10"></i></button>
                </form>
                <div class="toggle-text">New here? <a onclick="toggleForm('register')">Create Account</a></div>
            </div>

            <!-- Register -->
            <div id="register-section" class="form-section">
                <div class="form-header">
                    <h2>Register</h2>
                    <p>Join our network to track and report fraud.</p>
                </div>
                <form id="register-form" onsubmit="handleAuth(event, 'register')" class="auth-form">
                    <input id="reg-name" type="text" placeholder="Full Name" required>
                    <input id="reg-email" type="email" placeholder="Email Address" required>
                    <input id="reg-officer" type="text" placeholder="Officer ID (optional)">
                    <input id="reg-password" type="password" placeholder="Password (Min 6 chars)" required minlength="6">
                    <button type="submit" class="auth-btn" id="reg-btn">Register <i class="fas fa-user-plus ml-10"></i></button>
                </form>
                <div class="toggle-text">Have an account? <a onclick="toggleForm('login')">Login</a></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        function toggleForm(target) {
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`${target}-section`).classList.add('active');
        }

        async function handleAuth(event, type) {
            event.preventDefault();
            const btn = document.getElementById(type === 'login' ? 'login-btn' : 'reg-btn');
            const originalText = btn.innerHTML;
            
            const data = type === 'login' ? {
                email: document.getElementById('login-email').value,
                password: document.getElementById('login-password').value
            } : {
                name: document.getElementById('reg-name').value,
                email: document.getElementById('reg-email').value,
                officer_id: document.getElementById('reg-officer').value || null,
                password: document.getElementById('reg-password').value
            };

            try {
                btn.disabled = true;
                btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Processing...`;

                const res = await fetch(`/api/${type}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await res.json();
                if (res.ok) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Success!',
                        text: result.message,
                        background: '#0F172A',
                        color: '#fff',
                        timer: 1500
                    }).then(() => {
                        if (type === 'login') {
                            sessionStorage.setItem('cyberalert_auth', 'true');
                            sessionStorage.setItem('cyberalert_user', JSON.stringify(result.user));
                            window.location.href = 'index.html';
                        } else {
                            toggleForm('login');
                        }
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Authentication Failed',
                        text: result.error || 'Something went wrong',
                        background: '#0F172A',
                        color: '#fff'
                    });
                }
            } catch (err) {
                Swal.fire({
                    icon: 'error',
                    title: 'Connection Error',
                    text: 'Could not connect to the server.',
                    background: '#0F172A',
                    color: '#fff'
                });
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }
    </script>
</body>
</html>
